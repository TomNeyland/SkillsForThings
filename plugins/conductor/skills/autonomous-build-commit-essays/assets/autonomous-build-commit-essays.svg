<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Your git log can preserve product intent, not just diffs.</title>
  <desc id="desc">For non-trivial feature work, a short commit body can preserve who needed the change, what it enables, and which product decision future developers should inherit. A generic saved-search example contrasts a subject-only commit with a context-rich commit.</desc>

  <rect width="1600" height="2000" fill="#f7f6f2"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#181816">
    <text x="120" y="130" font-size="24" font-weight="700" letter-spacing="3" fill="#42647a">FEATURE COMMITS / PRODUCT MEMORY</text>

    <text x="120" y="305" font-size="92" font-weight="700" letter-spacing="-3">Your git log can preserve</text>
    <text x="120" y="410" font-size="92" font-weight="700" letter-spacing="-3">product intent, not just diffs.</text>
    <text x="120" y="500" font-size="32" fill="#51514d">For feature work, record who needed the change, why it matters, and which decision should survive.</text>

    <line x1="120" y1="570" x2="1480" y2="570" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="630" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">GENERIC EXAMPLE · ONE SAVED-SEARCH FEATURE</text>

    <!-- Left column bounds: [120,540]. -->
    <g>
      <text x="120" y="700" font-size="22" font-weight="700" letter-spacing="2" fill="#51514d">SUBJECT ONLY</text>
      <text x="120" y="765" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">feat: add saved views</text>

      <line x1="120" y1="815" x2="500" y2="815" stroke="#d1d0ca" stroke-width="2"/>
      <text x="120" y="875" font-size="22" font-weight="700" letter-spacing="2" fill="#51514d">A FUTURE READER LEARNS</text>
      <text x="120" y="925" font-size="30">What changed.</text>

      <text x="120" y="1000" font-size="22" font-weight="700" letter-spacing="2" fill="#a14332">THE HISTORY LOSES</text>
      <text x="120" y="1050" font-size="28" fill="#51514d">Who needed it</text>
      <text x="120" y="1090" font-size="28" fill="#51514d">Why it matters</text>
      <text x="120" y="1130" font-size="28" fill="#51514d">Which decision it preserves</text>
    </g>

    <line x1="575" y1="680" x2="575" y2="1160" stroke="#d1d0ca" stroke-width="2"/>

    <!-- Right column bounds: [630,1480]. -->
    <g>
      <text x="630" y="700" font-size="22" font-weight="700" letter-spacing="2" fill="#51514d">SUBJECT + SHORT BODY</text>
      <text x="630" y="760" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">feat(views): restore saved filters</text>

      <text x="630" y="830" font-size="29">Returning users rebuild the same search every session.</text>
      <text x="630" y="875" font-size="29">Persist the query, filters, and sort order with the account.</text>

      <text x="630" y="950" font-size="22" font-weight="700" letter-spacing="2" fill="#42647a">DECISION TO PRESERVE</text>
      <text x="630" y="1000" font-size="31" font-weight="700">Saved state follows the user,</text>
      <text x="630" y="1042" font-size="31" font-weight="700">not one browser.</text>

      <line x1="630" y1="1090" x2="1480" y2="1090" stroke="#42647a" stroke-width="3"/>
      <text x="630" y="1140" font-size="24" font-weight="700" letter-spacing="1" fill="#42647a">PRESERVES WHO · WHY · BEHAVIOR · DECISION</text>
    </g>

    <line x1="120" y1="1210" x2="1480" y2="1210" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="1270" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">FOR EACH NON-TRIVIAL FEATURE COMMIT, ANSWER</text>

    <!-- Column bounds: WHO [120,500], CHANGE [590,980], DECISION [1070,1480]. -->
    <g>
      <text x="120" y="1340" font-size="36" font-weight="700">WHO</text>
      <text x="120" y="1390" font-size="28" fill="#51514d">Who needs this change?</text>
      <text x="120" y="1430" font-size="28" fill="#51514d">What problem do they hit?</text>
    </g>

    <line x1="545" y1="1310" x2="545" y2="1450" stroke="#d1d0ca" stroke-width="2"/>

    <g>
      <text x="590" y="1340" font-size="36" font-weight="700">WHAT IT ENABLES</text>
      <text x="590" y="1390" font-size="28" fill="#51514d">What becomes possible</text>
      <text x="590" y="1430" font-size="28" fill="#51514d">after this feature lands?</text>
    </g>

    <line x1="1025" y1="1310" x2="1025" y2="1450" stroke="#d1d0ca" stroke-width="2"/>

    <g>
      <text x="1070" y="1340" font-size="36" font-weight="700">DECISION</text>
      <text x="1070" y="1390" font-size="28" fill="#51514d">Which behavior or tradeoff</text>
      <text x="1070" y="1430" font-size="28" fill="#51514d">must future work preserve?</text>
    </g>

    <line x1="120" y1="1490" x2="1480" y2="1490" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="1550" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">WHAT CHANGES</text>
    <text x="120" y="1615" font-size="44" font-weight="700">A future developer can recover why the product</text>
    <text x="120" y="1670" font-size="44" font-weight="700">works this way without reconstructing the diff.</text>

    <line x1="120" y1="1720" x2="1480" y2="1720" stroke="#d1d0ca" stroke-width="2"/>
    <text x="120" y="1785" font-size="32" font-weight="700">Write the message with the commit, while the reasoning is still fresh.</text>

    <line x1="120" y1="1880" x2="1480" y2="1880" stroke="#d1d0ca" stroke-width="2"/>
    <text x="120" y="1940" font-size="22" fill="#51514d">autonomous-build-commit-essays · repository workflow</text>
  </g>
</svg>
