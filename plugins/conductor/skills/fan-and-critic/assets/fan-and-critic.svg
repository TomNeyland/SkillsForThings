<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">AI wrote the patch. Review it twice—independently.</title>
  <desc id="desc">Before merging AI-written code, give two independent reviewers the same candidate patch, surrounding repository code, and identical review instructions. Both try to find faults and return ranked findings with a failure scenario, file and line, and severity. Keep every concrete issue either reviewer finds, and send ship-blocking or substantively fixed code to two new reviewers.</desc>

  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .primary { fill: #181816; }
      .secondary { fill: #51514d; }
      .accent { fill: #42647a; }
      .rule { stroke: #d1d0ca; stroke-width: 3; }
      .flow { stroke: #42647a; stroke-width: 4; fill: none; }
      .headline { font: 700 94px Helvetica, Arial, sans-serif; letter-spacing: -2px; }
      .section-label { font: 700 24px Helvetica, Arial, sans-serif; letter-spacing: 2px; }
      .body { font: 400 34px Helvetica, Arial, sans-serif; }
      .body-sm { font: 400 28px Helvetica, Arial, sans-serif; }
      .body-bold { font: 700 32px Helvetica, Arial, sans-serif; }
      .reviewer-title { font: 700 31px Helvetica, Arial, sans-serif; }
      .reviewer-body { font: 400 28px Helvetica, Arial, sans-serif; }
      .output-title { font: 700 38px Helvetica, Arial, sans-serif; }
      .decision-title { font: 700 28px Helvetica, Arial, sans-serif; letter-spacing: .6px; }
      .decision-body { font: 400 30px Helvetica, Arial, sans-serif; }
      .statement { font: 700 50px Helvetica, Arial, sans-serif; letter-spacing: -.8px; }
      .mono { font: 400 27px Menlo, Consolas, monospace; }
      .mono-bold { font: 700 34px Menlo, Consolas, monospace; }
      .meta { font: 700 22px Helvetica, Arial, sans-serif; letter-spacing: 2px; }
      .identity { font: 400 22px Helvetica, Arial, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#42647a"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="2000"/>

  <!-- Outer top band: concrete domain and artifact -->
  <text x="120" y="118" class="meta accent">AI-GENERATED CODE REVIEW</text>
  <text x="1480" y="118" text-anchor="end" class="meta secondary">CANDIDATE PATCH · SCHEMATIC METHOD</text>
  <line x1="120" y1="158" x2="1480" y2="158" class="rule"/>

  <!-- Situation and changed behavior -->
  <text x="120" y="290" class="headline primary">AI wrote the patch.</text>
  <text x="120" y="394" class="headline primary">Review it twice—independently.</text>

  <text x="120" y="490" class="section-label accent">BEFORE YOU MERGE</text>
  <text x="120" y="543" class="body secondary">Give two reviewers the same real code and identical instructions.</text>
  <text x="120" y="588" class="body secondary">Ask both to find faults—not to confirm the author.</text>
  <line x1="120" y1="630" x2="1480" y2="630" class="rule"/>

  <!-- Concrete input -->
  <text x="120" y="690" class="section-label accent">SAME INPUT TO BOTH</text>
  <text x="120" y="745" class="mono-bold primary">candidate patch + surrounding repository code</text>
  <text x="120" y="792" class="mono secondary">one identical review prompt</text>

  <!-- Split to independent reviewers. Column bounds: 120..740, 860..1480. -->
  <path d="M800 812 L800 845 L430 845 L430 875 M800 845 L1170 845 L1170 875" class="flow"/>
  <circle cx="430" cy="910" r="31" fill="#42647a"/>
  <circle cx="1170" cy="910" r="31" fill="#42647a"/>
  <text x="430" y="920" text-anchor="middle" class="body-bold" fill="#f7f6f2">1</text>
  <text x="1170" y="920" text-anchor="middle" class="body-bold" fill="#f7f6f2">2</text>

  <text x="120" y="970" class="reviewer-title primary">INDEPENDENT REVIEWER 1</text>
  <text x="120" y="1012" class="reviewer-body secondary">Reads the real code and tries to find a failure.</text>
  <text x="120" y="1052" class="reviewer-body secondary">Returns ranked findings:</text>
  <text x="120" y="1097" class="mono primary">scenario · file:line · severity</text>

  <text x="860" y="970" class="reviewer-title primary">INDEPENDENT REVIEWER 2</text>
  <text x="860" y="1012" class="reviewer-body secondary">Reads the real code and tries to find a failure.</text>
  <text x="860" y="1052" class="reviewer-body secondary">Returns ranked findings:</text>
  <text x="860" y="1097" class="mono primary">scenario · file:line · severity</text>

  <!-- Combine concrete findings -->
  <path d="M430 1125 L430 1155 L800 1188 M1170 1125 L1170 1155 L800 1188" class="flow" marker-end="url(#arrow)"/>
  <text x="800" y="1250" text-anchor="middle" class="section-label accent">COMBINED OUTPUT</text>
  <text x="800" y="1310" text-anchor="middle" class="output-title primary">Keep every concrete issue either reviewer found.</text>
  <text x="800" y="1358" text-anchor="middle" class="body-sm secondary">Do not average disagreement away. A verified “clean” also counts.</text>

  <!-- Decision rules -->
  <line x1="120" y1="1405" x2="1480" y2="1405" class="rule"/>
  <text x="120" y="1460" class="section-label accent">ACT ON THE RESULT</text>

  <text x="120" y="1525" class="decision-title primary">ISSUES FOUND</text>
  <text x="520" y="1525" class="decision-body secondary">Fix the ranked list.</text>

  <text x="120" y="1585" class="decision-title primary">NO CONCRETE ISSUES</text>
  <text x="520" y="1585" class="decision-body secondary">Record a clean result.</text>

  <text x="120" y="1645" class="decision-title primary">SHIP-BLOCKING ISSUE OR SUBSTANTIVE FIX</text>
  <text x="120" y="1685" class="decision-body secondary">Send the fixed patch to two new reviewers.</text>

  <!-- Final action -->
  <line x1="120" y1="1725" x2="1480" y2="1725" class="rule"/>
  <text x="120" y="1790" class="statement primary">Keep every issue. Re-review substantive fixes.</text>

  <!-- Quiet skill handle in the outer bottom band -->
  <line x1="120" y1="1880" x2="1480" y2="1880" class="rule"/>
  <text x="120" y="1935" class="identity secondary">fan-and-critic</text>
  <text x="1480" y="1935" text-anchor="end" class="identity secondary">Independent reviews before trust</text>
</svg>
