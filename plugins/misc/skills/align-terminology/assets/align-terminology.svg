<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Align schema terminology with authoritative names</title>
  <desc id="desc">Audit schema field, model, and enum names by locating the right authority, applying the expert-recognition test, classifying each name, and recording an action. The audit is complete when every name has an authority, status, and action.</desc>
  <style>.sans{font-family:Helvetica,Arial,sans-serif}.mono{font-family:Menlo,Consolas,monospace}</style>
  <rect width="1600" height="2000" fill="#f7f6f2"/>
  <text class="sans" x="120" y="112" font-size="22" font-weight="700" letter-spacing="2.4" fill="#42647a">SCHEMA TERMINOLOGY AUDIT</text>
  <text class="sans" x="1480" y="112" text-anchor="end" font-size="22" fill="#51514d">FIELDS · MODELS · ENUMS</text>
  <line x1="120" y1="146" x2="1480" y2="146" stroke="#d1d0ca" stroke-width="2"/>

  <text class="sans" x="120" y="284" font-size="82" font-weight="700" fill="#181816">A readable name can still</text>
  <text class="sans" x="120" y="378" font-size="82" font-weight="700" fill="#181816">be wrong to an expert.</text>
  <text class="sans" x="120" y="446" font-size="32" fill="#51514d">Input: a schema’s field names, model names, and enum values.</text>

  <line x1="120" y1="510" x2="1480" y2="510" stroke="#181816" stroke-width="3"/>
  <text class="sans" x="120" y="562" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">THE WORKFLOW</text>

  <circle cx="150" cy="646" r="28" fill="#42647a"/>
  <text class="sans" x="150" y="656" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">1</text>
  <text class="sans" x="210" y="638" font-size="31" font-weight="700" fill="#181816">Inventory the names and the concepts they claim to represent.</text>
  <text class="sans" x="210" y="680" font-size="28" fill="#51514d">Do not audit spelling alone; name the underlying concept first.</text>

  <line x1="150" y1="680" x2="150" y2="748" stroke="#42647a" stroke-width="4"/>
  <circle cx="150" cy="782" r="28" fill="#42647a"/>
  <text class="sans" x="150" y="792" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">2</text>
  <text class="sans" x="210" y="774" font-size="31" font-weight="700" fill="#181816">Find the highest applicable authority.</text>

  <g class="sans">
    <rect x="210" y="816" width="370" height="122" fill="#e8edf0"/>
    <text x="232" y="854" font-size="22" font-weight="700" letter-spacing="1.4" fill="#42647a">CROSS-DOMAIN</text>
    <text x="232" y="892" font-size="26" fill="#181816">ISO · IETF/RFC · IANA</text>
    <text x="232" y="924" font-size="24" fill="#51514d">or a format specification</text>
    <rect x="605" y="816" width="370" height="122" fill="#e8edf0"/>
    <text x="627" y="854" font-size="22" font-weight="700" letter-spacing="1.4" fill="#42647a">DOMAIN-SPECIFIC</text>
    <text x="627" y="892" font-size="26" fill="#181816">Standards body</text>
    <text x="627" y="924" font-size="24" fill="#51514d">or reference vocabulary</text>
    <rect x="1000" y="816" width="370" height="122" fill="#e8edf0"/>
    <text x="1022" y="854" font-size="22" font-weight="700" letter-spacing="1.4" fill="#42647a">GENUINELY INTERNAL</text>
    <text x="1022" y="892" font-size="26" fill="#181816">No authority exists</text>
    <text x="1022" y="924" font-size="24" fill="#51514d">document why it is new</text>
  </g>

  <line x1="150" y1="938" x2="150" y2="996" stroke="#42647a" stroke-width="4"/>
  <circle cx="150" cy="1030" r="28" fill="#42647a"/>
  <text class="sans" x="150" y="1040" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">3</text>
  <text class="sans" x="210" y="1022" font-size="31" font-weight="700" fill="#181816">Apply the expert test.</text>
  <text class="sans" x="210" y="1066" font-size="28" fill="#51514d">Would a specialist recognize this name without an explanation?</text>

  <line x1="150" y1="1064" x2="150" y2="1130" stroke="#42647a" stroke-width="4"/>
  <circle cx="150" cy="1164" r="28" fill="#42647a"/>
  <text class="sans" x="150" y="1174" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">4</text>
  <text class="sans" x="210" y="1156" font-size="31" font-weight="700" fill="#181816">Classify each name before changing it.</text>
  <g class="sans" font-size="25">
    <text x="210" y="1212" font-weight="700" fill="#42647a">ALIGNED</text><text x="392" y="1212" fill="#51514d">authority’s term matches</text>
    <text x="210" y="1254" font-weight="700" fill="#a14332">MISNAMED</text><text x="392" y="1254" fill="#51514d">authority uses another term</text>
    <text x="210" y="1296" font-weight="700" fill="#a14332">CONFLATED</text><text x="392" y="1296" fill="#51514d">standard term, different concept</text>
    <text x="820" y="1212" font-weight="700" fill="#a14332">OVERSIMPLIFIED</text><text x="1060" y="1212" fill="#51514d">standard is richer</text>
    <text x="820" y="1254" font-weight="700" fill="#a14332">AMBIGUOUS</text><text x="1060" y="1254" fill="#51514d">authorities disagree</text>
    <text x="820" y="1296" font-weight="700" fill="#42647a">INVENTED</text><text x="1060" y="1296" fill="#51514d">no standard covers it</text>
  </g>

  <line x1="150" y1="1316" x2="150" y2="1372" stroke="#42647a" stroke-width="4"/>
  <circle cx="150" cy="1406" r="28" fill="#42647a"/>
  <text class="sans" x="150" y="1416" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">5</text>
  <text class="sans" x="210" y="1398" font-size="31" font-weight="700" fill="#181816">Record the authority, status, and action.</text>

  <rect x="210" y="1442" width="1160" height="138" fill="#e8edf0"/>
  <text class="mono" x="238" y="1490" font-size="24" fill="#51514d">[STATUS] current_name → Authority: recognized_term | Action</text>
  <text class="mono" x="238" y="1538" font-size="25" fill="#181816">[MISNAMED] is_critical → RFC 5424: severity | Rename to severity</text>

  <line x1="120" y1="1640" x2="1480" y2="1640" stroke="#181816" stroke-width="3"/>
  <text class="sans" x="120" y="1694" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">OUTPUT</text>
  <text class="sans" x="120" y="1744" font-size="31" font-weight="700" fill="#181816">A terminology audit with one action for every schema name.</text>
  <text class="sans" x="120" y="1790" font-size="28" fill="#51514d">Complete when every name has an authority, classification, and recorded action.</text>

  <line x1="120" y1="1888" x2="1480" y2="1888" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="1946" font-size="22" fill="#51514d">align-terminology</text>
</svg>
