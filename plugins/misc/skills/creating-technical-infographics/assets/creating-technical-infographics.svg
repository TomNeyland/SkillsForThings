<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Technical infographic production workflow</title>
  <desc id="desc">Turn a technical explanation into an editable SVG and faithful PNG by defining the reader task, selecting a visual form from the relationship, exposing the working method, building within feed-safe geometry, inspecting two raster sizes, and passing a caption-free cold-reader test.</desc>
  <style>.sans{font-family:Helvetica,Arial,sans-serif}.mono{font-family:Menlo,Consolas,monospace}</style>
  <rect width="1600" height="2000" fill="#f7f6f2"/>
  <text class="sans" x="120" y="112" font-size="22" font-weight="700" letter-spacing="2.4" fill="#42647a">TECHNICAL INFOGRAPHIC METHOD</text>
  <text class="sans" x="1480" y="112" text-anchor="end" font-size="22" fill="#51514d">EDITABLE SVG + RENDERED PNG</text>
  <line x1="120" y1="146" x2="1480" y2="146" stroke="#d1d0ca" stroke-width="2"/>

  <text class="sans" x="120" y="274" font-size="78" font-weight="700" fill="#181816">Turn a technical explanation</text>
  <text class="sans" x="120" y="364" font-size="78" font-weight="700" fill="#181816">into a verified visual artifact.</text>
  <text class="sans" x="120" y="432" font-size="31" fill="#51514d">Input: a workflow, failure mode, comparison, instruction, or technical explanation.</text>

  <line x1="120" y1="488" x2="1480" y2="488" stroke="#181816" stroke-width="3"/>
  <text class="sans" x="120" y="536" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">1 · DEFINE THE COMMUNICATION JOB</text>
  <text class="sans" x="120" y="584" font-size="28" font-weight="700" fill="#181816">Audience → situation → takeaway → action</text>
  <text class="sans" x="120" y="626" font-size="26" fill="#51514d">Name the concrete input, ordered operations, decision criteria, output, and completion check.</text>

  <line x1="120" y1="674" x2="1480" y2="674" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="722" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">2 · CHOOSE THE FORM FROM THE RELATIONSHIP</text>
  <g class="sans">
    <text x="120" y="774" font-size="25" font-weight="700" fill="#181816">Ordered actions</text>
    <text x="450" y="774" font-size="25" fill="#51514d">→ numbered sequence</text>
    <text x="120" y="816" font-size="25" font-weight="700" fill="#181816">Branch or state change</text>
    <text x="450" y="816" font-size="25" fill="#51514d">→ flow / before-and-after</text>
    <text x="120" y="858" font-size="25" font-weight="700" fill="#181816">Components or ownership</text>
    <text x="450" y="858" font-size="25" fill="#51514d">→ labeled diagram</text>
    <text x="820" y="774" font-size="25" font-weight="700" fill="#181816">Exact lookup</text>
    <text x="1160" y="774" font-size="25" fill="#51514d">→ table</text>
    <text x="820" y="816" font-size="25" font-weight="700" fill="#181816">Quantitative comparison</text>
    <text x="1160" y="816" font-size="25" fill="#51514d">→ bar / dot plot</text>
    <text x="820" y="858" font-size="25" font-weight="700" fill="#181816">Change over time</text>
    <text x="1160" y="858" font-size="25" fill="#51514d">→ line chart</text>
  </g>

  <line x1="120" y1="906" x2="1480" y2="906" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="954" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">3 · DRAFT ONE READING PATH</text>
  <text class="sans" x="120" y="1002" font-size="28" font-weight="700" fill="#181816">Situation → mechanism → decision / output → completion</text>
  <text class="sans" x="120" y="1044" font-size="26" fill="#51514d">Give the working method at least half the useful canvas; use one proof, not a feature grid.</text>

  <line x1="120" y1="1092" x2="1480" y2="1092" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="1140" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">4 · BUILD THE SVG</text>
  <g class="sans" font-size="26">
    <text x="120" y="1190" font-weight="700" fill="#181816">1600×2000 canvas</text><text x="430" y="1190" fill="#51514d">essential content at y=200…1800</text>
    <text x="120" y="1232" font-weight="700" fill="#181816">120 px side margins</text><text x="430" y="1232" fill="#51514d">live text · explicit line breaks · no foreignObject</text>
    <text x="120" y="1274" font-weight="700" fill="#181816">Body type ≥ 28 px</text><text x="430" y="1274" fill="#51514d">one accent color · direct labels · column bounds declared first</text>
  </g>

  <line x1="120" y1="1322" x2="1480" y2="1322" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="1370" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">5 · RENDER AND INSPECT THE RASTER</text>
  <text class="sans" x="120" y="1418" font-size="28" font-weight="700" fill="#181816">Inspect the PNG at 1600×2000 and 400×500.</text>
  <text class="sans" x="120" y="1460" font-size="26" fill="#51514d">Check edges, wrapping, labels, crops, and every column boundary. Failure → fix SVG → rerender.</text>

  <line x1="120" y1="1508" x2="1480" y2="1508" stroke="#d1d0ca" stroke-width="2"/>
  <text class="sans" x="120" y="1556" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">6 · RUN THE CAPTION-FREE READER GATE</text>
  <text class="sans" x="120" y="1604" font-size="27" fill="#181816">Reader names input, ordered method, branches, output, and completion check.</text>
  <text class="sans" x="120" y="1646" font-size="26" fill="#51514d">Score ≥ 4/5 and share without a caption. Failure → revise the artifact and test again.</text>

  <line x1="120" y1="1694" x2="1480" y2="1694" stroke="#181816" stroke-width="3"/>
  <text class="sans" x="120" y="1742" font-size="23" font-weight="700" letter-spacing="2.2" fill="#42647a">OUTPUT + COMPLETION</text>
  <text class="sans" x="120" y="1790" font-size="29" font-weight="700" fill="#181816">Editable SVG + faithful sRGB PNG + concise alt text.</text>
  <text class="sans" x="120" y="1832" font-size="25" fill="#51514d">Complete when XML, dimensions, raster inspection, deterministic rerender, and reader gate pass.</text>

  <text class="sans" x="120" y="1946" font-size="22" fill="#51514d">creating-technical-infographics</text>
</svg>
