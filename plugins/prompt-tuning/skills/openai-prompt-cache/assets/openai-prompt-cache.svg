<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Build one stable OpenAI prompt prefix, then use the cache controls for the model family</title>
  <desc id="desc">Repeated OpenAI requests need at least 1,024 reusable tokens before variable content. Keep tools, schemas, developer or system instructions, and examples byte-stable. GPT-5.6 and later use a prompt cache key, optional explicit breakpoint, and a 30-minute minimum TTL; earlier models use automatic prefix caching and supported retention policies. Measure cached tokens and cache write tokens to verify reuse and cost.</desc>

  <rect width="1600" height="2000" fill="#f7f6f2"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#181816">
    <text x="120" y="102" font-size="24" font-weight="700" letter-spacing="2.1" fill="#42647a">OPENAI PROMPT CACHING · CURRENT MODEL SPLIT</text>
    <text x="1480" y="102" text-anchor="end" font-size="24" font-weight="700" letter-spacing="1.4" fill="#51514d">REUSE + COST VERIFICATION</text>
    <line x1="120" y1="142" x2="1480" y2="142" stroke="#d1d0ca" stroke-width="3"/>

    <text x="120" y="244" font-size="84" font-weight="700">Build one stable prefix.</text>
    <text x="120" y="340" font-size="84" font-weight="700">Choose controls by model family.</text>
    <text x="120" y="408" font-size="33" fill="#51514d">The stable-first rule is universal. Breakpoints and retention controls are not.</text>

    <line x1="120" y1="464" x2="1480" y2="464" stroke="#d1d0ca" stroke-width="3"/>
    <text x="120" y="522" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">1 · PASS THE CACHE FLOOR</text>
    <text x="120" y="580" font-size="40" font-weight="700">Reusable rendered prefix ≥ 1,024 tokens</text>
    <text x="120" y="628" font-size="30" fill="#51514d">Below the floor, <tspan font-family="Menlo, Consolas, monospace">cached_tokens</tspan> remains zero.</text>

    <line x1="120" y1="684" x2="1480" y2="684" stroke="#d1d0ca" stroke-width="3"/>
    <text x="120" y="742" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">2 · PUT STABLE BYTES BEFORE VARIABLE CONTENT</text>
    <text x="120" y="796" font-size="29" fill="#51514d">Snapshot serialization so the same logical prefix also produces the same bytes.</text>

    <line x1="120" y1="870" x2="1030" y2="870" stroke="#42647a" stroke-width="7"/>
    <text x="120" y="914" font-size="23" font-weight="700" letter-spacing="1.6" fill="#42647a">STABLE PREFIX</text>
    <text x="120" y="966" font-size="34" font-weight="700">tools · schema · developer / system · examples</text>
    <text x="120" y="1010" font-size="28" fill="#51514d">fixed ordering · fixed JSON · fixed example order</text>

    <line x1="1065" y1="842" x2="1065" y2="1035" stroke="#a14332" stroke-width="5"/>
    <text x="1092" y="884" font-size="22" font-weight="700" letter-spacing="1.3" fill="#a14332">PREFIX ENDS</text>
    <text x="1092" y="934" font-size="31" font-weight="700">variable tail</text>
    <text x="1092" y="976" font-size="27" fill="#51514d">user input · RAG</text>
    <text x="1092" y="1016" font-size="27" fill="#51514d">IDs · timestamps</text>

    <line x1="120" y1="1084" x2="1480" y2="1084" stroke="#d1d0ca" stroke-width="3"/>
    <text x="120" y="1142" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">3 · BRANCH BY MODEL FAMILY</text>
    <line x1="800" y1="1176" x2="800" y2="1504" stroke="#d1d0ca" stroke-width="3"/>

    <text x="120" y="1228" font-size="36" font-weight="700">GPT-5.6 AND LATER</text>
    <text x="120" y="1274" font-size="27" font-weight="700" fill="#42647a">IMPLICIT OR EXPLICIT BREAKPOINTS</text>
    <text x="120" y="1330" font-size="29"><tspan font-family="Menlo, Consolas, monospace">prompt_cache_key</tspan> identifies the workload.</text>
    <text x="120" y="1374" font-size="29">Place an explicit breakpoint after stable content</text>
    <text x="120" y="1414" font-size="29">when you need to control the cached boundary.</text>
    <text x="120" y="1468" font-size="29"><tspan font-family="Menlo, Consolas, monospace">prompt_cache_options.ttl = "30m"</tspan></text>
    <text x="120" y="1508" font-size="27" fill="#51514d">minimum lifetime · current default and only value</text>

    <text x="850" y="1228" font-size="36" font-weight="700">EARLIER MODELS</text>
    <text x="850" y="1274" font-size="27" font-weight="700" fill="#42647a">AUTOMATIC PREFIX CACHING</text>
    <text x="850" y="1330" font-size="29">Keep the same stable-first prefix discipline.</text>
    <text x="850" y="1374" font-size="29">Reuse a stable <tspan font-family="Menlo, Consolas, monospace">prompt_cache_key</tspan>.</text>
    <text x="850" y="1428" font-size="29"><tspan font-family="Menlo, Consolas, monospace">prompt_cache_retention</tspan> selects a supported</text>
    <text x="850" y="1468" font-size="29">maximum-retention policy for that model.</text>
    <text x="850" y="1508" font-size="27" fill="#51514d">Support varies: in-memory and/or extended retention.</text>

    <line x1="120" y1="1560" x2="1480" y2="1560" stroke="#d1d0ca" stroke-width="3"/>
    <text x="120" y="1618" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">4 · MEASURE THE REAL WORKLOAD</text>
    <text x="120" y="1674" font-size="31" font-weight="700">Repeat identical-prefix calls; log reads and writes on every response.</text>

    <text x="120" y="1732" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">cached_tokens</text>
    <text x="380" y="1732" font-size="28" fill="#51514d">tokens reused from cache</text>
    <text x="850" y="1732" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">cache_write_tokens</text>
    <text x="1190" y="1732" font-size="28" fill="#51514d">GPT-5.6+ writes</text>

    <text x="120" y="1790" font-size="29">Compare uncached input cost, cache-write cost, and subsequent cached reads.</text>

    <line x1="120" y1="1836" x2="1480" y2="1836" stroke="#42647a" stroke-width="4"/>
    <text x="120" y="1890" font-size="30" font-weight="700">Complete when repeated production-shaped calls prove prefix reuse and measured cost.</text>

    <text x="120" y="1950" font-size="24" fill="#51514d">openai-prompt-cache</text>
    <text x="1480" y="1950" text-anchor="end" font-size="24" fill="#51514d">stable prefix → model branch → measured reuse</text>
  </g>
</svg>
