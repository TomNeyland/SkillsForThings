<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">Choose the infographic surface before writing its brief</title>
  <desc id="desc">Read the live source, then branch by surface. An individual skill needs a method explainer brief with input, operations, decisions, output, and completion. A plugin package needs a skill index built from every live skill. A repository needs a package index built from manifests and child counts. Build the SVG and PNG, reference the PNG from README, then apply the matching cold-reader or routing test.</desc>
  <rect width="1600" height="2000" fill="#f7f6f2"/>
  <defs>
    <style>
      .sans { font-family: Helvetica, Arial, sans-serif; fill: #181816; }
      .mono { font-family: Menlo, Consolas, monospace; fill: #181816; }
      .meta { font-size: 22px; font-weight: 700; letter-spacing: 2px; fill: #42647a; }
      .headline { font-size: 76px; font-weight: 700; letter-spacing: -1.4px; }
      .section { font-size: 23px; font-weight: 700; letter-spacing: 1.8px; fill: #42647a; }
      .step { font-size: 31px; font-weight: 700; }
      .body { font-size: 28px; fill: #51514d; }
      .branch { font-size: 28px; font-weight: 700; }
      .branch-body { font-size: 26px; fill: #51514d; }
      .output { font-size: 28px; font-weight: 700; }
      .small { font-size: 23px; fill: #51514d; }
      .rule { stroke: #d1d0ca; stroke-width: 3; }
      .accent-rule { stroke: #42647a; stroke-width: 4; }
    </style>
  </defs>

  <text x="120" y="108" class="sans meta">SKILL INFOGRAPHICS / SURFACE ROUTING</text>
  <text x="1480" y="108" text-anchor="end" class="sans meta">WORKING METHOD</text>
  <line x1="120" y1="146" x2="1480" y2="146" class="rule"/>

  <text x="120" y="250" class="sans headline">Choose the surface before</text>
  <text x="120" y="340" class="sans headline">you write the brief.</text>

  <text x="120" y="420" class="sans section">INPUT</text>
  <text x="120" y="468" class="sans body">Target skill + required references, or live directory children + manifests.</text>
  <line x1="120" y1="515" x2="1480" y2="515" class="rule"/>

  <text x="120" y="570" class="sans section">1 · READ THE AUTHORITATIVE SOURCE</text>
  <text x="120" y="616" class="sans body">Extract the real reader job, mechanism, decisions, outputs, and easily misunderstood details.</text>

  <text x="120" y="690" class="sans section">2 · BRANCH BY WHAT THE READER MUST CHOOSE</text>
  <line x1="570" y1="720" x2="570" y2="1115" class="rule"/>
  <line x1="1060" y1="720" x2="1060" y2="1115" class="rule"/>

  <text x="120" y="770" class="sans branch">INDIVIDUAL SKILL</text>
  <text x="120" y="814" class="sans branch-body">Reader chooses one capability.</text>
  <text x="120" y="870" class="sans branch-body">Brief contains:</text>
  <text x="120" y="912" class="sans branch-body">• situation + concrete input</text>
  <text x="120" y="954" class="sans branch-body">• 3–6 operations + branches</text>
  <text x="120" y="996" class="sans branch-body">• output + completion check</text>
  <text x="120" y="1060" class="sans branch-body">Test: repeat the method.</text>

  <text x="620" y="770" class="sans branch">PLUGIN PACKAGE</text>
  <text x="620" y="814" class="sans branch-body">Reader chooses a skill.</text>
  <text x="620" y="870" class="sans branch-body">Brief contains:</text>
  <text x="620" y="912" class="sans branch-body">• package job</text>
  <text x="620" y="954" class="sans branch-body">• every live skill row</text>
  <text x="620" y="996" class="sans branch-body">• name · choose when · output</text>
  <text x="620" y="1060" class="sans branch-body">Test: route two situations.</text>

  <text x="1110" y="770" class="sans branch">REPOSITORY</text>
  <text x="1110" y="814" class="sans branch-body">Reader chooses a package.</text>
  <text x="1110" y="870" class="sans branch-body">Brief contains:</text>
  <text x="1110" y="912" class="sans branch-body">• repository job</text>
  <text x="1110" y="954" class="sans branch-body">• every live package row</text>
  <text x="1110" y="996" class="sans branch-body">• scope · cue · child count</text>
  <text x="1110" y="1060" class="sans branch-body">Test: route two situations.</text>

  <line x1="120" y1="1115" x2="1480" y2="1115" class="rule"/>

  <text x="120" y="1175" class="sans section">3 · BUILD THE MATCHING ASSET</text>
  <text x="120" y="1225" class="sans step">Editable SVG → 1600 × 2000 PNG → README image after the H1</text>
  <text x="120" y="1268" class="sans body">The README carries useful alt text. SKILL.md remains instruction-only.</text>

  <text x="120" y="1350" class="sans section">4 · VERIFY THE RIGHT FAILURE MODE</text>
  <text x="120" y="1400" class="sans branch">EXPLAINER</text>
  <text x="340" y="1400" class="sans body">Full + 400×500 inspection; cold reader repeats input → method → output; score ≥ 4.</text>
  <text x="120" y="1455" class="sans branch">INDEX</text>
  <text x="340" y="1455" class="sans body">Live child list is complete; two reader situations route to the correct row.</text>

  <line x1="120" y1="1515" x2="1480" y2="1515" class="accent-rule"/>
  <text x="120" y="1570" class="sans section">OUTPUT ARTIFACTS</text>

  <text x="120" y="1630" class="sans output">SURFACE-SPECIFIC BRIEF</text>
  <text x="120" y="1670" class="sans small">explainer fields or complete index rows</text>
  <text x="650" y="1630" class="sans output">SVG</text>
  <text x="650" y="1670" class="sans small">editable source</text>
  <text x="900" y="1630" class="sans output">PNG</text>
  <text x="900" y="1670" class="sans small">1600 × 2000 · sRGB</text>
  <text x="1200" y="1630" class="sans output">README</text>
  <text x="1200" y="1670" class="sans small">image + useful alt</text>

  <text x="120" y="1750" class="sans section">COMPLETE WHEN</text>
  <text x="120" y="1798" class="sans step">The raster matches the SVG, and the intended reader can use it without a caption.</text>

  <line x1="120" y1="1880" x2="1480" y2="1880" class="rule"/>
  <text x="120" y="1935" class="mono small">framing-skill-infographics</text>
  <text x="1480" y="1935" text-anchor="end" class="sans small">explainer brief ≠ directory index brief</text>
</svg>
