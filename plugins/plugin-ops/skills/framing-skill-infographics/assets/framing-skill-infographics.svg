<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2000" viewBox="0 0 1600 2000" role="img" aria-labelledby="title desc">
  <title id="title">A skill manual is not an infographic script.</title>
  <desc id="desc">A useful skill infographic does not summarize every section of the manual. It identifies the reader’s situation, the useful change, and one concrete proof. A generic prompt-caching example shows a detailed skill manual becoming one public story about a missed cache, stable instructions, and a shared prompt prefix.</desc>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#42647a"/>
    </marker>
  </defs>

  <rect width="1600" height="2000" fill="#f7f6f2"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#181816">
    <text x="120" y="130" font-size="24" font-weight="700" letter-spacing="3" fill="#42647a">TECHNICAL SKILLS / SHAREABLE INFOGRAPHICS</text>

    <text x="120" y="305" font-size="92" font-weight="700" letter-spacing="-3">A skill manual is not</text>
    <text x="120" y="410" font-size="92" font-weight="700" letter-spacing="-3">an infographic script.</text>
    <text x="120" y="500" font-size="34" fill="#51514d">Explain the reader’s situation, the useful change, and one concrete proof.</text>

    <line x1="120" y1="570" x2="1480" y2="570" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="630" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">GENERIC EXAMPLE · A PROMPT-CACHING SKILL</text>

    <!-- Left column bounds: [120,500]. -->
    <g>
      <text x="120" y="700" font-size="22" font-weight="700" letter-spacing="2" fill="#51514d">THE MANUAL CONTAINS</text>
      <text x="120" y="755" font-size="40" font-weight="700">SKILL.md</text>
      <text x="120" y="815" font-size="30" fill="#51514d">Trigger phrases</text>
      <text x="120" y="860" font-size="30" fill="#51514d">Complete workflow</text>
      <text x="120" y="905" font-size="30" fill="#51514d">Edge cases</text>
      <text x="120" y="950" font-size="30" fill="#51514d">SDK commands</text>
      <text x="120" y="995" font-size="30" fill="#51514d">Citations</text>
      <text x="120" y="1060" font-size="24" font-weight="700" letter-spacing="1" fill="#a14332">KEEP IN MARKDOWN</text>
    </g>

    <g>
      <text x="525" y="790" font-size="22" font-weight="700" letter-spacing="2" fill="#42647a">SELECT</text>
      <line x1="520" y1="825" x2="640" y2="825" stroke="#42647a" stroke-width="4" marker-end="url(#arrow)"/>
      <text x="515" y="875" font-size="22" font-weight="700" letter-spacing="1" fill="#51514d">ONE STORY</text>
    </g>

    <!-- Right column bounds: [700,1480]. -->
    <g>
      <text x="700" y="700" font-size="22" font-weight="700" letter-spacing="2" fill="#51514d">THE IMAGE SHOWS</text>

      <text x="700" y="755" font-size="22" font-weight="700" letter-spacing="2" fill="#42647a">READER’S SITUATION</text>
      <text x="700" y="805" font-size="32" font-weight="700">“Why did my repeated prompt</text>
      <text x="700" y="845" font-size="32" font-weight="700">miss the cache?”</text>

      <text x="700" y="910" font-size="22" font-weight="700" letter-spacing="2" fill="#42647a">USEFUL CHANGE</text>
      <text x="700" y="960" font-size="30">Put stable instructions before</text>
      <text x="700" y="1000" font-size="30">changing input.</text>

      <text x="700" y="1065" font-size="22" font-weight="700" letter-spacing="2" fill="#42647a">CONCRETE PROOF</text>
      <text x="700" y="1115" font-family="Menlo, Consolas, monospace" font-size="28">system + tools + docs │ user A</text>
      <text x="700" y="1160" font-family="Menlo, Consolas, monospace" font-size="28">system + tools + docs │ user B</text>
      <line x1="700" y1="1178" x2="1072" y2="1178" stroke="#42647a" stroke-width="4"/>
      <text x="700" y="1215" font-size="22" font-weight="700" letter-spacing="1" fill="#42647a">SHARED PREFIX STAYS IDENTICAL</text>
    </g>

    <line x1="120" y1="1260" x2="1480" y2="1260" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="1320" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">THE SELECTION RULE</text>

    <!-- Column bounds: SITUATION [120,500], CHANGE [590,980], PROOF [1070,1480]. -->
    <g>
      <text x="120" y="1390" font-size="36" font-weight="700">SITUATION</text>
      <text x="120" y="1440" font-size="28" fill="#51514d">What problem makes the</text>
      <text x="120" y="1480" font-size="28" fill="#51514d">reader reach for this skill?</text>
    </g>

    <line x1="545" y1="1360" x2="545" y2="1500" stroke="#d1d0ca" stroke-width="2"/>

    <g>
      <text x="590" y="1390" font-size="36" font-weight="700">USEFUL CHANGE</text>
      <text x="590" y="1440" font-size="28" fill="#51514d">What becomes different</text>
      <text x="590" y="1480" font-size="28" fill="#51514d">for the reader?</text>
    </g>

    <line x1="1025" y1="1360" x2="1025" y2="1500" stroke="#d1d0ca" stroke-width="2"/>

    <g>
      <text x="1070" y="1390" font-size="36" font-weight="700">VISIBLE PROOF</text>
      <text x="1070" y="1440" font-size="28" fill="#51514d">Which example makes</text>
      <text x="1070" y="1480" font-size="28" fill="#51514d">that change believable?</text>
    </g>

    <line x1="120" y1="1540" x2="1480" y2="1540" stroke="#d1d0ca" stroke-width="2"/>

    <text x="120" y="1600" font-size="24" font-weight="700" letter-spacing="2" fill="#42647a">LEAVE THE MANUAL IN MARKDOWN</text>
    <text x="120" y="1650" font-size="30" fill="#51514d">Installation · full workflow · edge cases · citations · command syntax</text>

    <line x1="120" y1="1700" x2="1480" y2="1700" stroke="#d1d0ca" stroke-width="2"/>
    <text x="120" y="1765" font-size="42" font-weight="700">One reader problem. One useful change. One visible proof.</text>

    <line x1="120" y1="1880" x2="1480" y2="1880" stroke="#d1d0ca" stroke-width="2"/>
    <text x="120" y="1940" font-size="22" fill="#51514d">framing-skill-infographics · repository editorial guide</text>
  </g>
</svg>
